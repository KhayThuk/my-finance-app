<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกและสรุปรายรับ-รายจ่าย</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 gap-6">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-slate-800">📊 สรุปยอดบัญชีร้าน</h2>
            <button onclick="fetchSummary()" class="text-xs bg-blue-50 text-blue-600 px-2.5 py-1.5 rounded-lg hover:bg-blue-100 transition-colors cursor-pointer font-medium">🔄 อัปเดตยอด</button>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-emerald-50 p-2.5 rounded-xl">
                <p class="text-xs text-emerald-600 font-medium">รายรับรวม</p>
                <p id="summary-income" class="text-sm font-bold text-emerald-700">0.00</p>
            </div>
            <div class="bg-rose-50 p-2.5 rounded-xl">
                <p class="text-xs text-rose-600 font-medium">รายจ่ายรวม</p>
                <p id="summary-expense" class="text-sm font-bold text-rose-700">0.00</p>
            </div>
            <div class="bg-blue-50 p-2.5 rounded-xl">
                <p class="text-xs text-blue-600 font-medium">กำไรสุทธิ</p>
                <p id="summary-net" class="text-sm font-bold text-blue-700">0.00</p>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-xl font-bold text-center text-slate-800 mb-6">📝 บันทึกรายรับ-รายจ่าย</h1>
        
        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button id="btn-income" onclick="switchType('รายรับ')" class="flex-1 py-2 text-center font-medium rounded-lg bg-white text-emerald-600 shadow-sm transition-all cursor-pointer">💰 รายรับ</button>
            <button id="btn-expense" onclick="switchType('รายจ่าย')" class="flex-1 py-2 text-center font-medium rounded-lg text-slate-600 transition-all cursor-pointer">📉 รายจ่าย</button>
        </div>

        <form id="finance-form" onsubmit="handleSubmit(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">หมวดหมู่</label>
                <select id="category" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
            </div>
            <div>
                <label id="amount-label" class="block text-sm font-medium text-slate-700 mb-1">จำนวนเงินกำไร (บาท)</label>
                <input type="number" id="amount" step="0.01" required min="0.01" placeholder="0.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="submit-btn" class="w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-xl transition-colors shadow-md cursor-pointer">บันทึกรายการ</button>
        </form>
    </div>

    <script>
        // ใส่ URL Web App ของคุณที่นี่
        const SCRIPT_URL = "วาง_URL_WEB_APP_ของ_GOOGLE_APPS_SCRIPT_ตรงนี้";

        let currentType = 'รายรับ';
        const categories = {
            'รายรับ': ['Netflix', 'iQIYI', 'WeTV', 'YouTube', 'รายการอื่นๆ'],
            'รายจ่าย': ['โอนค่าสั่งข้าว', 'เติมเงินซื้อของเข้าร้าน']
        };

        function updateDropdown() {
            const select = document.getElementById('category');
            const label = document.getElementById('amount-label');
            const submitBtn = document.getElementById('submit-btn');
            select.innerHTML = '';
            
            categories[currentType].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });

            if (currentType === 'รายรับ') {
                label.textContent = 'จำนวนเงินกำไร (บาท)';
                submitBtn.className = "w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-xl transition-colors cursor-pointer shadow-md shadow-emerald-100";
            } else {
                label.textContent = 'จำนวนเงินที่จ่าย (บาท)';
                submitBtn.className = "w-full py-3.5 bg-rose-500 hover:bg-rose-600 text-white font-medium rounded-xl transition-colors cursor-pointer shadow-md shadow-rose-100";
            }
        }

        function switchType(type) {
            currentType = type;
            const btnIncome = document.getElementById('btn-income');
            const btnExpense = document.getElementById('btn-expense');
            if (type === 'รายรับ') {
                btnIncome.className = "flex-1 py-2 text-center font-medium rounded-lg bg-white text-emerald-600 shadow-sm cursor-pointer";
                btnExpense.className = "flex-1 py-2 text-center font-medium rounded-lg text-slate-600 cursor-pointer";
            } else {
                btnIncome.className = "flex-1 py-2 text-center font-medium rounded-lg text-slate-600 cursor-pointer";
                btnExpense.className = "flex-1 py-2 text-center font-medium rounded-lg bg-white text-rose-600 shadow-sm cursor-pointer";
            }
            updateDropdown();
        }

        // ฟังก์ชันดึงยอดสรุปจาก Google Sheet มาโชว์บนเว็บ
        async function fetchSummary() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                document.getElementById('summary-income').textContent = data.income.toFixed(2);
                document.getElementById('summary-expense').textContent = data.expense.toFixed(2);
                document.getElementById('summary-net').textContent = data.net.toFixed(2);
            } catch (error) {
                console.error("ไม่สามารถดึงข้อมูลสรุปยอดได้:", error);
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const data = {
                type: currentType,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังบันทึก...';

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                alert('บันทึกข้อมูลเรียบร้อยแล้ว! 🎉');
                document.getElementById('amount').value = '';
                // บันทึกเสร็จให้โหลดตัวเลขสรุปยอดใหม่ทันที
                setTimeout(fetchSummary, 1000);
                
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
            } finally {
                submitBtn.disabled = false;
                updateDropdown();
            }
        }

        // โหลดข้อมูลครั้งแรกเมื่อเปิดหน้าเว็บ
        updateDropdown();
        fetchSummary();
    </script>
</body>
</html>
